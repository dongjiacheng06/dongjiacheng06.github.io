<div align="center">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" style="max-width: 800px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
    <defs>
    <!-- 发光渐变色 1：代表最新鲜的数据流 -->
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#00F2FE"/>
    <stop offset="100%" stop-color="#4FACFE"/>
    </linearGradient>
    <!-- 发光渐变色 2：代表记忆的融合与过渡 -->
    <linearGradient id="neon2" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#4FACFE"/>
    <stop offset="100%" stop-color="#736EFE"/>
    </linearGradient>
    <!-- 荧光泛光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="10" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    </defs>
    <!-- 暗色科技背景 -->
    <rect width="100%" height="100%" fill="#0D1117"/>
    <!-- 底层轨道：代表完整的 Recurrent State (循环状态) -->
    <path d="M 400 200 C 500 100, 700 100, 700 200 C 700 300, 500 300, 400 200 C 300 100, 100 100, 100 200 C 100 300, 300 300, 400 200" fill="none" stroke="#1f2937" stroke-width="40" stroke-linecap="round"/>
    <!-- 虚线暗块：代表被切割的独立 Memory Patches (未被更新的保留记忆) -->
    <path d="M 400 200 C 500 100, 700 100, 700 200 C 700 300, 500 300, 400 200 C 300 100, 100 100, 100 200 C 100 300, 300 300, 400 200" fill="none" stroke="#374151" stroke-width="24" stroke-dasharray="15 25" stroke-linecap="round"/>
    <!-- 动态发光亮块 (右侧)：代表 Bottom-k 被选中更新的 Memory Patches -->
    <path d="M 400 200 C 500 100, 700 100, 700 200 C 700 300, 500 300, 400 200" fill="none" stroke="url(#neon)" stroke-width="24" stroke-dasharray="15 25" stroke-linecap="round" filter="url(#glow)"/>
    <!-- 动态发光亮块 (左上部分)：代表随着时间流逝的流式写入 -->
    <path d="M 400 200 C 300 100, 100 100, 100 200" fill="none" stroke="url(#neon2)" stroke-width="24" stroke-dasharray="15 25" stroke-linecap="round" filter="url(#glow)"/>
    <!-- Logo 文字设计 -->
    <text x="400" y="370" font-family="Arial, sans-serif" font-weight="800" font-size="46" fill="#ffffff" text-anchor="middle" letter-spacing="4">MeMix</text>
    <text x="400" y="405" font-family="Arial, sans-serif" font-weight="400" font-size="14" fill="#9ca3af" text-anchor="middle" letter-spacing="3">WRITING LESS, REMEMBERING MORE</text>
    </svg>
</div>